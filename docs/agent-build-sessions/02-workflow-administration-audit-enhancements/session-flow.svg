  <text class="tiny" x="940" y="683">High value</text>
  <text class="tiny" x="1010" y="560">Low value</text>
  <text class="tiny" x="1490" y="775">Audit rows, history tables</text>
  <text class="tiny" x="84" y="1045">Rate limiting remains backlog: login, registration, enrollment decisions, workflow mutations, CSV export, PDF export.</text>
