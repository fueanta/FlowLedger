  <text class="tiny" x="1328" y="585">Invoice PDF attachment</text>

  <rect class="box system" x="1300" y="660" width="300" height="98"/>
  <text class="label" x="1328" y="692">Invoice Lifecycle</text>
  <text class="small" x="1328" y="718">Issued, print/download PDF</text>
  <text class="tiny" x="1328" y="740">Accounts/Admin mark paid</text>

  <rect class="box data" x="1300" y="815" width="300" height="106"/>
  <text class="label" x="1328" y="847">Audit + Temporal</text>
  <text class="small" x="1328" y="873">Who did it and why</text>
