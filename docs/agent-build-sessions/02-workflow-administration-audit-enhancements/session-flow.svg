<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 40px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 20px Helvetica, Arial, sans-serif; fill: #475569; }
      .lane { font: 700 20px Helvetica, Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .sales { fill: #eff6ff; stroke: #2563eb; }
      .admin { fill: #f5f3ff; stroke: #7c3aed; }
      .accounts { fill: #fefce8; stroke: #ca8a04; }
      .manager { fill: #fff7ed; stroke: #ea580c; }
      .system { fill: #ecfdf5; stroke: #16a34a; }
      .data { fill: #f0fdfa; stroke: #0f766e; }
      .label { font: 700 18px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Helvetica, Arial, sans-serif; fill: #475569; }
      .tiny { font: 400 13px Helvetica, Arial, sans-serif; fill: #64748b; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1120"/>
