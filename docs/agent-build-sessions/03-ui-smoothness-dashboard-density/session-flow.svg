<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">FlowLedger Behaviour Flow</title>
  <desc id="desc">Generic product flow covering login, dashboard review, work queue attention, request workflow, invoicing, payment completion, and audit visibility.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1e293b" />
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #dbeafe; }
      .section { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 18px Arial, sans-serif; fill: #334155; }
      .small { font: 600 16px Arial, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .pill { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1; }
      .accent { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.5; }
      .warn { fill: #fee2e2; stroke: #fca5a5; stroke-width: 1.5; }
      .flow { fill: none; stroke: #1e293b; stroke-width: 4; marker-end: url(#arrow); }
      .ghost { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="0" y="0" width="1600" height="120" fill="url(#header)" />
  <text x="80" y="70" class="title">FlowLedger Behaviour Flow</text>
  <text x="80" y="100" class="subtitle">Billing requests move from creation to approval, invoicing, payment, and audit visibility with role-aware queue attention.</text>

  <rect x="70" y="180" rx="18" ry="18" width="300" height="190" class="card" />
  <text x="100" y="230" class="section">1. Login + landing</text>
  <rect x="100" y="255" rx="12" ry="12" width="115" height="34" class="pill" />
  <text x="124" y="278" class="small">JWT auth</text>
  <text x="100" y="320" class="body">Role signs in, dashboard opens with</text>
  <text x="100" y="348" class="body">period filter, brief loading state,</text>
  <text x="100" y="376" class="body">and smoother route/modal motion.</text>

  <rect x="430" y="180" rx="18" ry="18" width="330" height="220" class="card" />
  <text x="460" y="230" class="section">2. Dashboard review</text>
  <rect x="460" y="255" rx="12" ry="12" width="165" height="34" class="pill" />
  <text x="481" y="278" class="small">1 / 3 / 6 / 12 months</text>
  <text x="460" y="320" class="body">Period activity changes by window.</text>
  <text x="460" y="348" class="body">Current workload stays consistent.</text>
  <text x="460" y="376" class="body">Demo data shows recent and older</text>
  <text x="460" y="404" class="body">invoice patterns for reviewer demos.</text>

  <rect x="830" y="160" rx="18" ry="18" width="330" height="250" class="card" />
  <text x="860" y="210" class="section">3. Work queue attention</text>
  <rect x="860" y="235" rx="12" ry="12" width="152" height="34" class="accent" />
  <text x="887" y="258" class="small">Role-aware badge</text>
  <text x="860" y="300" class="body">Badge beside My Work stays visible</text>
  <text x="860" y="328" class="body">while Accounts, Manager, Sales, or</text>
  <text x="860" y="356" class="body">Admin still have pending queue items.</text>
  <text x="860" y="384" class="body">Badge clears only when queue count</text>
  <text x="860" y="412" class="body">drops to zero after work is handled.</text>

  <rect x="1230" y="180" rx="18" ry="18" width="290" height="220" class="card" />
  <text x="1260" y="230" class="section">4. Billing request flow</text>
  <text x="1260" y="290" class="body">Sales drafts and submits request.</text>
  <text x="1260" y="318" class="body">Accounts reviews.</text>
  <text x="1260" y="346" class="body">High-value items escalate to Manager.</text>
  <text x="1260" y="374" class="body">Reject path returns to Sales revision.</text>

  <rect x="250" y="520" rx="18" ry="18" width="360" height="210" class="card" />
  <text x="280" y="570" class="section">5. Invoice + payment</text>
  <rect x="280" y="595" rx="12" ry="12" width="132" height="34" class="pill" />
  <text x="304" y="618" class="small">Issued invoice</text>
  <text x="280" y="660" class="body">Approved requests generate invoice.</text>
  <text x="280" y="688" class="body">Accounts can print, export PDF,</text>
  <text x="280" y="716" class="body">and mark payment complete.</text>

  <rect x="690" y="520" rx="18" ry="18" width="360" height="210" class="card" />
  <text x="720" y="570" class="section">6. Admin controls</text>
  <text x="720" y="630" class="body">Admin manages users, enrollment,</text>
  <text x="720" y="658" class="body">VAT, approval threshold, due days,</text>
  <text x="720" y="686" class="body">and JWT lifetime in database.</text>

  <rect x="1130" y="520" rx="18" ry="18" width="360" height="210" class="card" />
  <text x="1160" y="570" class="section">7. Audit visibility</text>
  <rect x="1160" y="595" rx="12" ry="12" width="148" height="34" class="warn" />
  <text x="1188" y="618" class="small">Timeline + logs</text>
  <text x="1160" y="660" class="body">Comments, workflow actions, PDF</text>
  <text x="1160" y="688" class="body">events, and status changes stay</text>
  <text x="1160" y="716" class="body">visible through audit surfaces.</text>

  <path d="M370 275 H430" class="flow" />
  <path d="M760 285 H830" class="flow" />
  <path d="M1160 290 H1230" class="flow" />
  <path d="M1375 400 V470 H430 V520" class="flow" />
  <path d="M610 625 H690" class="flow" />
  <path d="M1050 625 H1130" class="flow" />
  <path d="M995 410 V520" class="ghost" />

  <rect x="70" y="790" rx="16" ry="16" width="1460" height="70" fill="#0f172a" opacity="0.05" />
  <text x="100" y="833" class="body">Core UX signals: reduced-motion support, persistent work attention, denser demo reporting, and stable workflow data for manual and automated verification.</text>
</svg>
